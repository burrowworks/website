<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Burrowworks — Launching Soon</title>
  <meta name="description" content="Burrowworks is launching soon.">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      overflow: hidden;
      position: relative;
    }

    /* subtle animated gradient background */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 20% 30%, rgba(80, 80, 120, 0.15), transparent 50%),
                  radial-gradient(circle at 80% 70%, rgba(60, 80, 100, 0.12), transparent 50%);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 600px;
    }

    .logo {
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 3rem;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 1.5rem;
      color: #fafafa;
    }

    .accent {
      color: #888;
      font-weight: 200;
    }

    p {
      font-size: 1.125rem;
      line-height: 1.6;
      color: #999;
      font-weight: 300;
      max-width: 440px;
      margin: 0 auto;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: #333;
      margin: 3rem auto;
    }

    footer {
      position: absolute;
      bottom: 2rem;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.75rem;
      color: #555;
      letter-spacing: 0.1em;
      z-index: 1;
    }

    /* breathing animation on the logo */
    @keyframes breathe {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    .logo {
      animation: breathe 4s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Burrowworks</div>
    <h1>Something<span class="accent"> is</span><br>being built.</h1>
    <div class="divider"></div>
    <p>A new project is in the works. Check back soon.</p>
  </div>
  <footer>© 2026 Burrowworks</footer>
</body>
</html>
